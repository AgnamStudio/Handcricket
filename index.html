
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HCPL Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Teko:wght@500;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; /* Very dark slate */
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            user-select: none; /* Prevent accidental text selection while tapping */
        }

        .font-display { font-family: 'Teko', sans-serif; }

        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animations */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-text { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .coin-flip { animation: flip 1.2s ease-out forwards; }
        @keyframes flip {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(720deg) scale(1.5); }
            100% { transform: rotateY(1440deg) scale(1); }
        }
        
        button:active { transform: scale(0.96); }
        button:disabled { transform: scale(1); opacity: 0.5; cursor: not-allowed; }
        .match-btn { transition: all 0.1s; }
        .commentary-scroll { scroll-behavior: smooth; }
        .glow-text { text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <!-- Mobile App Container -->
    <div id="app" class="w-full max-w-md bg-slate-900 h-screen sm:h-[95vh] sm:rounded-3xl shadow-2xl relative overflow-hidden flex flex-col border border-slate-800">
        <!-- Rendered Content Appears Here -->
    </div>

    <script>
        // --- DATA & STATE MANAGEMENT ---
        const STORAGE_KEY = 'hcpl_app_data_v_final';

        const defaultState = {
            view: 'home', 
            activeTourneyId: null,
            activeMatchId: null,
            tournaments: []
        };

        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState;

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        const utils = {
            id: () => Math.random().toString(36).substr(2, 9),
            formatOvers: (balls) => `${Math.floor(balls / 6)}.${balls % 6}`,
            randomComment: (type) => {
                const comments = {
                    6: ["Massive hit! Out of the park! 🔥", "Six runs! Beautiful timing.", "What a shot! It's huge! 🚀", "Clean strike into the stands!"],
                    4: ["Cracking shot for four!", "Finds the gap, four runs.", "Boundary! Excellent placement. ✨", "Pierces the infield for 4!"],
                    3: ["Great running between the wickets.", "Three runs taken. Excellent hustle."],
                    2: ["Pushes for two.", "Good running, gets two comfortably."],
                    1: ["Just a single.", "Taps and runs.", "Quick single taken.", "Rotates the strike."],
                    0: ["Dot ball. Good bowling.", "No run.", "Defended well. 🛡️", "Beaten! Great delivery."],
                    'W': ["WICKET! He has to go! ❌", "Bowled him! What a delivery!", "Caught! Huge moment! 😱", "Stumped! Brilliant work!"]
                };
                let opts = comments[type] || comments[0];
                return opts[Math.floor(Math.random() * opts.length)];
            },
            createMatch: (stage, t1Id, t2Id, tourneySettings) => ({
                id: utils.id(), stage: stage,
                team1: t1Id, team2: t2Id,
                status: 'pending', inn: 1,
                t1Score: 0, t1Wickets: 0, t1Balls: 0,
                t2Score: 0, t2Wickets: 0, t2Balls: 0,
                t1Sixes: 0, t1Fours: 0, t2Sixes: 0, t2Fours: 0,
                t1Super: tourneySettings.superShots, t1Life: tourneySettings.lifeCards,
                t2Super: tourneySettings.superShots, t2Life: tourneySettings.lifeCards,
                pendingWicket: false, 
                winnerId: null, logs: [],
                tossDone: false, tossWinnerId: null, tossChoice: null,
                // Super Over State
                isSuperOver: false, soInn: 1,
                soT1Score: 0, soT1Wickets: 0, soT1Balls: 0,
                soT2Score: 0, soT2Wickets: 0, soT2Balls: 0
            })
        };

        // --- GLOBAL APP LOGIC ---
        window.app = {
            navigate: (view, params = {}) => {
                state.view = view;
                if (params.tourneyId) state.activeTourneyId = params.tourneyId;
                if (params.matchId) state.activeMatchId = params.matchId;
                saveState();
                render();
            },
            
            // 1. TOURNAMENT CREATION
            tempTeams: [
                { id: utils.id(), name: 'Smashers', emoji: '🟣' },
                { id: utils.id(), name: 'Warriors', emoji: '🔵' },
                { id: utils.id(), name: 'Titans', emoji: '🟡' },
                { id: utils.id(), name: 'Knights', emoji: '🔴' }
            ],
            
            addTempTeam: () => {
                if(app.tempTeams.length >= 8) return alert("Max 8 teams allowed.");
                app.tempTeams.push({ id: utils.id(), name: `Team ${app.tempTeams.length + 1}`, emoji: '🏏' });
                render();
            },
            updateTempTeam: (index, field, value) => { app.tempTeams[index][field] = value; },
            removeTempTeam: (index) => {
                if(app.tempTeams.length <= 4) return alert("Min 4 teams required for Playoffs.");
                app.tempTeams.splice(index, 1);
                render();
            },
            createTournament: () => {
                const name = document.getElementById('t_name').value || 'New Season';
                const balls = parseInt(document.getElementById('t_balls').value) || 12;
                const wickets = parseInt(document.getElementById('t_wickets').value) || 2;
                const superShots = parseInt(document.getElementById('t_super_count').value) || 0;
                const lifeCards = parseInt(document.getElementById('t_life_count').value) || 0;
                const scheduleType = document.getElementById('t_schedule_type').value;
                const totalRandomMatches = parseInt(document.getElementById('t_matches_count').value) || 10;

                const settings = { balls, wickets, superShots, lifeCards };

                const newTourney = {
                    id: utils.id(), name, settings, teams: [...app.tempTeams], matches: [], playoffsGenerated: false, winner: null
                };

                const teams = newTourney.teams;
                let schedule = [];
                
                // Fair Equal Matches Logic
                if (scheduleType === 'single_rr' || scheduleType === 'double_rr') {
                    let rounds = scheduleType === 'single_rr' ? 1 : 2;
                    for (let r = 0; r < rounds; r++) {
                        for (let i = 0; i < teams.length; i++) {
                            for (let j = i + 1; j < teams.length; j++) {
                                schedule.push(utils.createMatch('League', teams[i].id, teams[j].id, settings));
                            }
                        }
                    }
                } else if (scheduleType === 'random') {
                    for (let i = 0; i < totalRandomMatches; i++) {
                        let t1 = teams[Math.floor(Math.random() * teams.length)];
                        let t2; do { t2 = teams[Math.floor(Math.random() * teams.length)]; } while (t1.id === t2.id);
                        schedule.push(utils.createMatch('League', t1.id, t2.id, settings));
                    }
                }
                
                newTourney.matches = schedule;
                state.tournaments.push(newTourney);
                
                // Reset Temp Teams
                app.tempTeams = [
                    { id: utils.id(), name: 'Smashers', emoji: '🟣' }, { id: utils.id(), name: 'Warriors', emoji: '🔵' },
                    { id: utils.id(), name: 'Titans', emoji: '🟡' }, { id: utils.id(), name: 'Knights', emoji: '🔴' }
                ];
                app.navigate('hub', { tourneyId: newTourney.id });
            },

            // 2. TOSS SYSTEM
            tossState: null,
            tossWinnerIdx: null,
            doToss: () => {
                app.tossState = 'flipping'; render();
                setTimeout(() => { app.tossWinnerIdx = Math.random() < 0.5 ? 1 : 2; app.tossState = 'result'; render(); }, 1200);
            },
            completeToss: (choice) => {
                const t = state.tournaments.find(x => x.id === state.activeTourneyId);
                const m = t.matches.find(x => x.id === state.activeMatchId);
                
                let winnerId = app.tossWinnerIdx === 1 ? m.team1 : m.team2;
                m.tossWinnerId = winnerId; m.tossChoice = choice; m.tossDone = true;

                // Restructure so Team1 is ALWAYS batting first
                let team1BatsFirst = true;
                if (winnerId === m.team1 && choice === 'bowl') team1BatsFirst = false;
                if (winnerId === m.team2 && choice === 'bat') team1BatsFirst = false;

                if (!team1BatsFirst) {
                    let temp = m.team1; m.team1 = m.team2; m.team2 = temp;
                    let tempS = m.t1Super; m.t1Super = m.t2Super; m.t2Super = tempS;
                    let tempL = m.t1Life; m.t1Life = m.t2Life; m.t2Life = tempL;
                }

                let winnerTeam = t.teams.find(x => x.id === winnerId);
                m.logs.unshift(`🪙 Toss: ${winnerTeam.name} won and chose to ${choice} first.`);
                
                app.tossState = null; app.tossWinnerIdx = null;
                app.navigate('match');
            },

            // 3. MATCH ENGINE
            activeSuperShot: false,
            toggleSuperShot: () => { app.activeSuperShot = !app.activeSuperShot; render(); },

            playBall: (run, isOut = false) => {
                const t = state.tournaments.find(x => x.id === state.activeTourneyId);
                const m = t.matches.find(x => x.id === state.activeMatchId);
                
                if (m.status === 'completed' || m.pendingWicket) return;
                if (m.status === 'pending') m.status = 'active';

                let isT1Batting = m.isSuperOver ? (m.soInn === 1) : (m.inn === 1);
                let actualRun = run;

                if (isOut) {
                    if (app.activeSuperShot) {
                        // CATASTROPHE MECHANIC
                        if (isT1Batting) {
                            if (m.isSuperOver) { m.soT1Wickets = 2; m.soT1Balls++; }
                            else { m.t1Wickets = t.settings.wickets; m.t1Balls++; }
                            m.t1Life = 0; m.t1Super--;
                        } else {
                            if (m.isSuperOver) { m.soT2Wickets = 2; m.soT2Balls++; }
                            else { m.t2Wickets = t.settings.wickets; m.t2Balls++; }
                            m.t2Life = 0; m.t2Super--;
                        }
                        
                        let currentBalls = isT1Batting ? (m.isSuperOver ? m.soT1Balls : m.t1Balls) : (m.isSuperOver ? m.soT2Balls : m.t2Balls);
                        m.logs.unshift(`Ball ${utils.formatOvers(currentBalls)}: 😱 CATASTROPHE! Caught on a Super Shot! ALL wickets lost! Innings over!`);
                        app.activeSuperShot = false;
                        app.checkMatchState(t, m);
                    } else {
                        // TRIGGER POST-WICKET LIFE CARD DECISION
                        m.pendingWicket = true; 
                    }
                    saveState();
                    if (m.status === 'completed') app.navigate('scorecard'); else render();
                    return;
                }

                // Normal Runs & Super Shot Success
                if (app.activeSuperShot) {
                    actualRun *= 2;
                    isT1Batting ? m.t1Super-- : m.t2Super--;
                    let currentBalls = isT1Batting ? (m.isSuperOver ? m.soT1Balls+1 : m.t1Balls+1) : (m.isSuperOver ? m.soT2Balls+1 : m.t2Balls+1);
                    m.logs.unshift(`Ball ${utils.formatOvers(currentBalls)}: 🔥 SUPER SHOT! ${actualRun} Runs!`);
                    app.activeSuperShot = false;
                } else {
                    let currentBalls = isT1Batting ? (m.isSuperOver ? m.soT1Balls+1 : m.t1Balls+1) : (m.isSuperOver ? m.soT2Balls+1 : m.t2Balls+1);
                    m.logs.unshift(`Ball ${utils.formatOvers(currentBalls)}: ${actualRun} Runs! ${utils.randomComment(run)}`);
                }

                // Stats (Ignored in Super Overs)
                if (!m.isSuperOver) {
                    if (actualRun === 6) isT1Batting ? m.t1Sixes++ : m.t2Sixes++;
                    if (actualRun === 4) isT1Batting ? m.t1Fours++ : m.t2Fours++;
                }

                if (m.isSuperOver) {
                    isT1Batting ? m.soT1Score += actualRun : m.soT2Score += actualRun;
                    isT1Batting ? m.soT1Balls++ : m.soT2Balls++;
                } else {
                    isT1Batting ? m.t1Score += actualRun : m.t2Score += actualRun;
                    isT1Batting ? m.t1Balls++ : m.t2Balls++;
                }

                app.checkMatchState(t, m);
                saveState();
                if (m.status === 'completed') app.navigate('scorecard'); else render();
            },

            handleWicketDecision: (useLifeCard) => {
                const t = state.tournaments.find(x => x.id === state.activeTourneyId);
                const m = t.matches.find(x => x.id === state.activeMatchId);
                let isT1Batting = m.isSuperOver ? (m.soInn === 1) : (m.inn === 1);

                m.pendingWicket = false; 

                if (useLifeCard) {
                    isT1Batting ? m.t1Life-- : m.t2Life--;
                    if (m.isSuperOver) isT1Batting ? m.soT1Balls++ : m.soT2Balls++; else isT1Batting ? m.t1Balls++ : m.t2Balls++;
                    
                    let currentBalls = isT1Batting ? (m.isSuperOver ? m.soT1Balls : m.t1Balls) : (m.isSuperOver ? m.soT2Balls : m.t2Balls);
                    m.logs.unshift(`Ball ${utils.formatOvers(currentBalls)}: 🛡️ LIFE CARD USED! Wicket cancelled!`);
                } else {
                    if (m.isSuperOver) {
                        isT1Batting ? m.soT1Wickets++ : m.soT2Wickets++;
                        isT1Batting ? m.soT1Balls++ : m.soT2Balls++;
                    } else {
                        isT1Batting ? m.t1Wickets++ : m.t2Wickets++;
                        isT1Batting ? m.t1Balls++ : m.t2Balls++;
                    }
                    let currentBalls = isT1Batting ? (m.isSuperOver ? m.soT1Balls : m.t1Balls) : (m.isSuperOver ? m.soT2Balls : m.t2Balls);
                    m.logs.unshift(`Ball ${utils.formatOvers(currentBalls)}: ${utils.randomComment('W')}`);
                }

                app.checkMatchState(t, m);
                saveState();
                if (m.status === 'completed') app.navigate('scorecard'); else render();
            },

            checkMatchState: (t, m) => {
                if (m.pendingWicket) return;

                if (!m.isSuperOver) {
                    let maxB = t.settings.balls; let maxW = t.settings.wickets;

                    if (m.inn === 1 && (m.t1Balls >= maxB || m.t1Wickets >= maxW)) {
                        m.inn = 2; app.activeSuperShot = false; m.logs.unshift("--- INNINGS BREAK ---");
                    } else if (m.inn === 2) {
                        let target = m.t1Score + 1;
                        if (m.t2Score >= target || m.t2Balls >= maxB || m.t2Wickets >= maxW) {
                            if (m.t2Score === m.t1Score) {
                                m.isSuperOver = true; m.soInn = 1; app.activeSuperShot = false;
                                m.logs.unshift("⚔️ MATCH TIED! SUPER OVER STARTING! ⚔️");
                            } else {
                                m.status = 'completed'; m.logs.unshift("--- MATCH OVER ---");
                                m.winnerId = m.t2Score > m.t1Score ? m.team2 : m.team1;
                                if (m.stage === 'Final') t.winner = m.winnerId;
                            }
                        }
                    }
                } else {
                    let maxSOBalls = 6; let maxSOWickets = 2;

                    if (m.soInn === 1 && (m.soT1Balls >= maxSOBalls || m.soT1Wickets >= maxSOWickets)) {
                        m.soInn = 2; app.activeSuperShot = false; m.logs.unshift("--- SUPER OVER: INNINGS BREAK ---");
                    } else if (m.soInn === 2) {
                        let target = m.soT1Score + 1;
                        if (m.soT2Score >= target || m.soT2Balls >= maxSOBalls || m.soT2Wickets >= maxSOWickets) {
                            if (m.soT2Score === m.soT1Score) {
                                m.soInn = 1; app.activeSuperShot = false;
                                m.soT1Score = 0; m.soT1Wickets = 0; m.soT1Balls = 0; m.soT2Score = 0; m.soT2Wickets = 0; m.soT2Balls = 0;
                                m.logs.unshift("😱 SUPER OVER TIED! ANOTHER SUPER OVER STARTING! 😱");
                            } else {
                                m.status = 'completed'; m.logs.unshift("--- SUPER OVER COMPLETED ---");
                                m.winnerId = m.soT2Score > m.soT1Score ? m.team2 : m.team1;
                                if (m.stage === 'Final') t.winner = m.winnerId;
                            }
                        }
                    }
                }
            },

            // 4. TOURNAMENT ENGINE
            generatePlayoffs: () => {
                const t = state.tournaments.find(x => x.id === state.activeTourneyId);
                const table = app.getPointsTable(t);
                if (table.length < 4) return alert("Need 4 teams for playoffs.");

                t.matches.push(utils.createMatch('Qualifier 1', table[0].id, table[1].id, t.settings));
                t.matches.push(utils.createMatch('Eliminator', table[2].id, table[3].id, t.settings));
                t.playoffsGenerated = true; saveState(); render();
            },

            checkPlayoffProgression: (t) => {
                if(!t.playoffsGenerated) return;
                let q1 = t.matches.find(m => m.stage === 'Qualifier 1'); let elim = t.matches.find(m => m.stage === 'Eliminator');
                let q2 = t.matches.find(m => m.stage === 'Qualifier 2'); let final = t.matches.find(m => m.stage === 'Final');

                if (q1?.status === 'completed' && elim?.status === 'completed' && !q2) {
                    let loserQ1 = q1.winnerId === q1.team1 ? q1.team2 : q1.team1;
                    t.matches.push(utils.createMatch('Qualifier 2', loserQ1, elim.winnerId, t.settings));
                }
                if (q1?.status === 'completed' && q2?.status === 'completed' && !final) {
                    t.matches.push(utils.createMatch('Final', q1.winnerId, q2.winnerId, t.settings));
                }
            },

            getPointsTable: (t) => {
                let p = {}; t.teams.forEach(team => { p[team.id] = { ...team, m: 0, w: 0, l: 0, tie: 0, pts: 0, runsFor: 0, ballsFor: 0, runsAgainst: 0, ballsAgainst: 0, nrr: 0 }; });

                t.matches.filter(m => m.status === 'completed' && m.stage === 'League').forEach(m => {
                    let t1 = p[m.team1]; let t2 = p[m.team2]; if(!t1 || !t2) return;
                    t1.m++; t2.m++;
                    
                    if (m.winnerId === m.team1) { t1.w++; t1.pts += 2; t2.l++; }
                    else if (m.winnerId === m.team2) { t2.w++; t2.pts += 2; t1.l++; }
                    else { t1.tie++; t2.tie++; t1.pts++; t2.pts++; } // Edge case fallback

                    let maxBalls = t.settings.balls;
                    let t1OversFaced = (m.t1Wickets >= t.settings.wickets) ? (maxBalls / 6) : (m.t1Balls / 6);
                    let t2OversFaced = (m.t2Wickets >= t.settings.wickets) ? (maxBalls / 6) : (m.t2Balls / 6);

                    t1.runsFor += m.t1Score; t1.ballsFor += t1OversFaced; t1.runsAgainst += m.t2Score; t1.ballsAgainst += t2OversFaced;
                    t2.runsFor += m.t2Score; t2.ballsFor += t2OversFaced; t2.runsAgainst += m.t1Score; t2.ballsAgainst += t1OversFaced;
                });

                let table = Object.values(p).map(team => {
                    let rf = team.runsFor; let of = team.ballsFor || 1;
                    let ra = team.runsAgainst; let oa = team.ballsAgainst || 1;
                    team.nrr = (team.m === 0) ? 0 : ((rf / of) - (ra / oa));
                    return team;
                });

                table.sort((a, b) => b.pts - a.pts || b.nrr - a.nrr);
                return table;
            },

            getTournamentStats: (t) => {
                let stats = {};
                t.teams.forEach(team => { stats[team.id] = { ...team, runs: 0, wickets: 0, sixes: 0, fours: 0, mvpPts: 0, matches: 0 }; });

                let highestScore = { score: 0, team: null }; let highestChase = { score: 0, team: null }; let lowestDefend = { score: 9999, team: null };

                t.matches.filter(m => m.status === 'completed').forEach(m => {
                    if (!stats[m.team1] || !stats[m.team2]) return;
                    stats[m.team1].matches++; stats[m.team2].matches++;

                    stats[m.team1].runs += m.t1Score; stats[m.team1].wickets += m.t2Wickets; stats[m.team1].sixes += m.t1Sixes; stats[m.team1].fours += m.t1Fours;
                    stats[m.team2].runs += m.t2Score; stats[m.team2].wickets += m.t1Wickets; stats[m.team2].sixes += m.t2Sixes; stats[m.team2].fours += m.t2Fours;

                    if (m.t1Score > highestScore.score) highestScore = { score: m.t1Score, team: stats[m.team1] };
                    if (m.t2Score > highestScore.score) highestScore = { score: m.t2Score, team: stats[m.team2] };

                    if (m.winnerId === m.team2 && m.t2Score > highestChase.score) highestChase = { score: m.t2Score, team: stats[m.team2] };
                    if (m.winnerId === m.team1 && m.t1Score < lowestDefend.score) lowestDefend = { score: m.t1Score, team: stats[m.team1] };
                });

                Object.values(stats).forEach(s => { s.mvpPts = s.runs + (s.wickets * 10) + (s.sixes * 2) + s.fours; });

                let sArr = Object.values(stats);
                return {
                    tableStats: sArr,
                    orangeCap: [...sArr].sort((a,b) => b.runs - a.runs)[0],
                    purpleCap: [...sArr].sort((a,b) => b.wickets - a.wickets)[0],
                    mostSixes: [...sArr].sort((a,b) => b.sixes - a.sixes)[0],
                    mostFours: [...sArr].sort((a,b) => b.fours - a.fours)[0],
                    mvp: [...sArr].sort((a,b) => b.mvpPts - a.mvpPts)[0],
                    highestScore, highestChase, lowestDefend
                };
            },

            hubTab: 'schedule',
            setHubTab: (tab) => { app.hubTab = tab; render(); },
            deleteTournament: (id) => { if(confirm("Delete this season?")) { state.tournaments = state.tournaments.filter(t => t.id !== id); app.navigate('home'); } }
        };

        // --- UI RENDER COMPONENTS ---
        const TopBar = (title, backView = null, backParams = {}) => `
            <div class="h-14 bg-slate-900 flex items-center px-4 shadow-md shrink-0 border-b border-slate-800 z-10">
                ${backView ? `<button onclick="app.navigate('${backView}', ${JSON.stringify(backParams).replace(/"/g, "'")})" class="p-2 -ml-2 text-blue-400 hover:text-blue-300 transition active:scale-90"><i data-lucide="arrow-left"></i></button>` : ''}
                <h1 class="text-xl font-bold ml-2 tracking-wide font-display text-white uppercase">${title}</h1>
            </div>
        `;

        function renderHome() {
            return `
                ${TopBar("HCPL Manager")}
                <div class="flex-1 overflow-y-auto p-4 space-y-6 fade-in no-scrollbar">
                    <div class="bg-gradient-to-br from-blue-700 to-indigo-900 rounded-2xl p-6 text-center shadow-lg relative overflow-hidden">
                        <i data-lucide="trophy" class="absolute -right-4 -bottom-4 w-32 h-32 text-white opacity-10"></i>
                        <h2 class="text-3xl font-bold font-display tracking-widest text-white drop-shadow-md mb-2">HAND CRICKET</h2>

                content = `<div class="space-y-3 pb-6 fade-in">`;
                
                if(t.winner) {
                    content += `

            const m = t.matches.find(x => x.id === state.activeMatchId);
            const t1 = t.teams.find(x => x.id === m.team1);
            const t2 = t.teams.find(x => x.id === m.team2);

            let content = '';
            if (app.tossState === 'flipping') {
                content = `
                    <div class="flex flex-col items-center justify-center h-64 gap-6">

                        <div class="text-slate-400 font-bold animate-pulse text-lg tracking-widest uppercase mt-4">Flipping...</div>

                let winner = app.tossWinnerIdx === 1 ? t1 : t2;
                content = `

                        <div class="text-7xl drop-shadow-xl mb-2">${winner.emoji}</div>

                    <div class="bg-slate-900 border border-slate-800 rounded-3xl pb-8 overflow-hidden shadow-xl relative">

        function renderMatch() {
            const t = state.tournaments.find(x => x.id === state.activeTourneyId);
            const m = t.matches.find(x => x.id === state.activeMatchId);
            
            // Failsafe rendering if accidentally called
            if(m.status === 'completed') return `<div class="flex h-full items-center justify-center bg-slate-950 text-slate-400 animate-pulse font-bold">Loading...</div>`;

            const t1 = t.teams.find(x => x.id === m.team1);
            const t2 = t.teams.find(x => x.id === m.team2);
            
            let isSuper = m.isSuperOver;
            let inn = isSuper ? m.soInn : m.inn;
            let batT = inn === 1 ? t1 : t2;
            
            let score = isSuper ? (inn === 1 ? m.soT1Score : m.soT2Score) : (inn === 1 ? m.t1Score : m.t2Score);
            let wickets = isSuper ? (inn === 1 ? m.soT1Wickets : m.soT2Wickets) : (inn === 1 ? m.t1Wickets : m.t2Wickets);
            let balls = isSuper ? (inn === 1 ? m.soT1Balls : m.soT2Balls) : (inn === 1 ? m.t1Balls : m.t2Balls);
            let remSuper = inn === 1 ? m.t1Super : m.t2Super;
            let remLife = inn === 1 ? m.t1Life : m.t2Life;
            
            let targetHtml = '';
            if (inn === 2) {
                let target = (isSuper ? m.soT1Score : m.t1Score) + 1;
                let needed = target - score;
                let remBalls = (isSuper ? 6 : t.settings.balls) - balls;
                targetHtml = `
                    <div class="bg-slate-800/90 text-center py-2 border-y border-slate-700 flex justify-around items-center px-4 shadow-inner">
                        <div class="text-xs text-slate-300 font-medium">Target: <span class="font-bold text-white text-sm ml-1">${target}</span></div>
                        <div class="h-4 w-px bg-slate-600"></div>
                        <div class="text-[11px] text-blue-300 font-bold uppercase tracking-widest pulse-text">Need ${needed} from ${remBalls}</div>
                    </div>
                `;
            }

            let controlsHtml = '';
            if (m.pendingWicket) {
                controlsHtml = `
                    <div class="bg-slate-900 p-5 pb-8 rounded-t-[32px] shadow-[0_-10px_40px_-5px_rgba(0,0,0,0.6)] z-20 text-center border-t border-red-900/40 fade-in">
                        <div class="bg-red-500/10 inline-block px-4 py-1.5 rounded-full border border-red-500/30 mb-3">
                            <h3 class="text-red-500 font-black text-xl animate-pulse tracking-widest">🚨 WICKET! 🚨</h3>
                        </div>
                        <p class="text-slate-300 text-sm mb-5 font-medium px-4">Batsman is OUT! Do you want to use a Life Card to cancel it?</p>
                        
                        <div class="flex flex-col gap-3">
                            <button onclick="app.handleWicketDecision(true)" class="w-full bg-gradient-to-r from-teal-500 to-emerald-600 text-white font-bold py-4 rounded-xl transition shadow-[0_0_15px_rgba(16,185,129,0.4)] active:scale-95 ${remLife <= 0 ? 'opacity-40 grayscale cursor-not-allowed shadow-none' : ''}" ${remLife <= 0 ? 'disabled' : ''}>

                            </button>
                            <button onclick="app.handleWicketDecision(false)" class="w-full bg-slate-800 border border-slate-700 hover:bg-slate-700 text-slate-300 font-bold py-4 rounded-xl transition active:scale-95">
                                Accept Wicket
                            </button>
                        </div>
                    </div>
                `;
            } else {
                controlsHtml = `
                    <div class="bg-slate-900 p-3 pt-4 rounded-t-[32px] shadow-[0_-10px_30px_-5px_rgba(0,0,0,0.6)] z-20 border-t border-slate-800">
                        <div class="flex justify-between items-center mb-3 px-2">
                            <div class="text-[11px] font-bold text-teal-400 bg-teal-900/20 px-2.5 py-1.5 rounded-lg border border-teal-800/40 tracking-wider">
                                🛡️ Life Cards: <span class="text-white">${remLife}</span>
                            </div>
                            ${t.settings.superShots > 0 ? `
                                <button onclick="app.toggleSuperShot()" class="px-3.5 py-1.5 rounded-lg text-[11px] font-bold uppercase tracking-wider border transition-all ${app.activeSuperShot ? 'bg-gradient-to-r from-orange-500 to-red-500 text-white border-transparent shadow-[0_0_15px_rgba(249,115,22,0.6)]' : 'bg-slate-800 text-orange-400 border-orange-500/40 hover:bg-slate-700'} ${remSuper <= 0 ? 'opacity-40 cursor-not-allowed shadow-none border-slate-700 text-slate-500' : ''}" ${remSuper <= 0 ? 'disabled' : ''}>
                                    🔥 Super Shot (${remSuper})
                                </button>
                            ` : '<div></div>'}

                        <div class="grid grid-cols-3 gap-2.5">

                            <button onclick="app.playBall(4)" class="match-btn bg-blue-900/40 hover:bg-blue-800 text-blue-300 h-14 rounded-2xl text-2xl font-display font-bold border-b-4 border-slate-950 flex justify-center items-center border border-blue-500/30 shadow-sm row-start-2 col-start-2">4</button>
                            <button onclick="app.playBall(6)" class="match-btn bg-amber-900/40 hover:bg-amber-800 text-amber-400 h-14 rounded-2xl text-3xl font-display font-bold border-b-4 border-slate-950 flex justify-center items-center border border-amber-500/40 shadow-sm row-start-2 col-start-3">6</button>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2.5 mt-2.5">
                            <button onclick="app.playBall(0)" class="match-btn bg-slate-800 hover:bg-slate-700 text-slate-400 h-14 rounded-2xl text-base font-bold border-b-4 border-slate-950 uppercase tracking-widest shadow-sm">Dot (0)</button>
                            <button onclick="app.playBall(0, true)" class="match-btn bg-red-600 hover:bg-red-500 text-white h-14 rounded-2xl text-xl font-black border-b-4 border-red-900 uppercase tracking-widest shadow-[0_0_15px_rgba(220,38,38,0.3)]">OUT</button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="h-12 bg-slate-900 flex items-center justify-between px-4 shadow-sm shrink-0 z-20">
                    <button onclick="app.navigate('hub', {tourneyId: '${t.id}'})" class="p-2 -ml-2 text-slate-400 active:scale-90 transition"><i data-lucide="x" class="w-5 h-5"></i></button>

                ${isSuper ? `<div class="bg-red-600 text-white text-center py-1.5 font-black text-[10px] uppercase tracking-widest animate-pulse shadow-md">⚔️ SUPER OVER ACTIVE ⚔️</div>` : ''}

                        </div>
                        <div class="text-center opacity-${inn===1? '40':'100'} transition-opacity duration-300">
                            <div class="text-2xl drop-shadow-md mb-0.5">${t2.emoji}</div>
                            <div class="text-[10px] text-slate-400 uppercase font-black tracking-wider truncate w-16">${t2.name}</div>
                            ${isSuper ? `<div class="text-[9px] text-slate-500 mt-1 font-bold">Match: ${m.t2Score}/${m.t2Wickets}</div>` : (inn === 2 ? `<div class="text-[9px] text-slate-500 font-bold uppercase tracking-wider mt-1">Batting</div>` : '')}
                        </div>
                    </div>

                    <div class="text-center mt-2">
                        <div class="text-[10px] ${isSuper ? 'text-red-400' : 'text-slate-400'} uppercase tracking-widest font-black mb-0.5">${batT.name} BATTING</div>
                        <div class="text-6xl font-display font-bold text-white tracking-tight leading-none drop-shadow-lg">
                            ${score}<span class="text-4xl text-slate-500">/${wickets}</span>
                        </div>
                        <div class="text-xs font-bold text-slate-300 mt-2 bg-slate-900 inline-block px-3.5 py-1 rounded-full border border-slate-800 shadow-inner">
                            Over <span class="text-white">${utils.formatOvers(balls)}</span> <span class="text-slate-600 mx-1.5">|</span> <span class="text-slate-500 text-[10px] uppercase tracking-wider">Max ${isSuper ? 1 : t.settings.balls/6}</span>

                    </div>
                </div>

                    ${m.logs.map((log) => `
                        <div class="text-[15px] leading-snug p-3.5 rounded-xl border-l-4 shadow-sm fade-in ${
                            log.includes('CATASTROPHE') ? 'bg-red-950 border-red-600 text-red-200 font-bold shadow-[0_2px_10px_rgba(220,38,38,0.2)]' :
                            log.includes('LIFE CARD USED') ? 'bg-teal-950/80 border-teal-500 text-teal-200 shadow-[0_2px_10px_rgba(20,184,166,0.1)]' :
                            log.includes('SUPER OVER') ? 'bg-red-900/30 border-red-500 text-white font-bold text-center text-xs tracking-widest uppercase' :
                            log.includes('WICKET') ? 'bg-red-900/10 border-red-500 text-red-200 font-medium' : 
                            log.includes('SUPER SHOT') ? 'bg-amber-900/10 border-amber-500 text-amber-200 font-medium' : 
                            log.includes('---') || log.includes('Toss:') ? 'bg-slate-900 border-blue-500 text-blue-300 text-center text-[11px] font-black uppercase tracking-widest' : 
                            'bg-slate-900 border-slate-700 text-slate-200 font-medium'
                        }">
                            ${log.replace('Ball ', '<span class="text-slate-500 font-mono mr-2.5 text-[13px] font-bold">').replace(':', '</span>')}
                        </div>
                    `).join('')}
                </div>

                ${controlsHtml}
            `;
        }

        function renderScorecard() {
            const t = state.tournaments.find(x => x.id === state.activeTourneyId);
            const m = t.matches.find(x => x.id === state.activeMatchId);
            const t1 = t.teams.find(x => x.id === m.team1);
            const t2 = t.teams.find(x => x.id === m.team2);

            let resultText = "Match Tied";
            let resultColor = "text-slate-300";
            
            if (m.isSuperOver && m.winnerId !== 'tie') {
                resultText = `${t.teams.find(x=>x.id===m.winnerId).name} won the Super Over!`;
                resultColor = "text-amber-400";
            } else if (m.winnerId === t1.id) {
                let runs = m.t1Score - m.t2Score;
                resultText = `${t1.name} won by ${runs} run${runs>1?'s':''}`;
                resultColor = "text-blue-400";
            } else if (m.winnerId === t2.id) {
                let wkts = t.settings.wickets - m.t2Wickets;
                resultText = `${t2.name} won by ${wkts} wkt${wkts>1?'s':''}`;
                resultColor = "text-blue-400";
            }

            return `
                ${TopBar("Scorecard", 'hub', {tourneyId: t.id})}
                <div class="flex-1 overflow-y-auto p-4 fade-in no-scrollbar bg-slate-950">
                    
                    <div class="bg-slate-900 rounded-3xl p-6 text-center shadow-lg border border-slate-800 relative overflow-hidden mb-6">
                        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-5">${m.stage} Match</div>
                        
                        <div class="flex justify-between items-center mb-5 relative z-10">
                            <div class="flex-1">
                                <div class="text-5xl mb-2 drop-shadow-md">${t1.emoji}</div>
                                <div class="text-sm font-bold text-slate-300 truncate">${t1.name}</div>
                                <div class="font-display text-4xl font-bold mt-1.5 text-white leading-none">${m.t1Score}<span class="text-2xl text-slate-500">/${m.t1Wickets}</span></div>
                                <div class="text-[11px] font-medium text-slate-500 mt-1.5 bg-slate-950 inline-block px-2 py-0.5 rounded border border-slate-800">${utils.formatOvers(m.t1Balls)} ov</div>
                            </div>
                            <div class="px-3 text-slate-700 font-black italic text-2xl">VS</div>
                            <div class="flex-1">
                                <div class="text-5xl mb-2 drop-shadow-md">${t2.emoji}</div>
                                <div class="text-sm font-bold text-slate-300 truncate">${t2.name}</div>
                                <div class="font-display text-4xl font-bold mt-1.5 text-white leading-none">${m.t2Score}<span class="text-2xl text-slate-500">/${m.t2Wickets}</span></div>

                            </div>

                                    <div class="text-center flex-1">
                                        <div class="font-display text-3xl leading-none">${m.soT1Score}<span class="text-xl text-red-300/50">/${m.soT1Wickets}</span></div>
                                        <div class="text-[10px] font-medium text-red-200/50 mt-1">${utils.formatOvers(m.soT1Balls)} ov</div>
                                    </div>
                                    <div class="text-xs text-red-500/30 font-black italic px-2">VS</div>
                                    <div class="text-center flex-1">
                                        <div class="font-display text-3xl leading-none">${m.soT2Score}<span class="text-xl text-red-300/50">/${m.soT2Wickets}</span></div>
                                        <div class="text-[10px] font-medium text-red-200/50 mt-1">${utils.formatOvers(m.soT2Balls)} ov</div>
                                    </div>
                                </div>
                            </div>

                            <div class="font-bold ${resultColor} text-sm uppercase tracking-wider">${resultText}</div>

                    <div class="bg-slate-900 rounded-2xl p-4 border border-slate-800 space-y-2 h-64 overflow-y-auto no-scrollbar shadow-inner">

                        </div>
                    </div>

                    <button onclick="app.navigate('home')" class="w-full bg-slate-800 text-white font-bold py-4.5 rounded-xl border border-slate-700 hover:bg-slate-700 transition active:scale-95 tracking-wide text-lg">
                        Return to Home
                    </button>
                </div>
            `;
        }

        // --- CORE INITIALIZATION ---
        function render() {
            const root = document.getElementById('app');
            let html = '';
            try {
                switch(state.view) {
                    case 'home': html = renderHome(); break;
                    case 'create': html = renderCreate(); break;
                    case 'hub': html = renderHub(); break;
                    case 'toss': html = renderToss(); break;
                    case 'match': html = renderMatch(); break;
                    case 'scorecard': html = renderScorecard(); break;
                    case 'awards': html = renderAwards(); break;
                    default: html = renderHome();
                }
            } catch (e) {
                console.error("Render Error:", e);
                html = `
                    <div class="flex flex-col h-full items-center justify-center p-8 text-center text-red-400 bg-slate-950">
                        <i data-lucide="alert-triangle" class="w-12 h-12 mb-4 text-red-500"></i>
                        <h2 class="text-xl font-bold text-white mb-2">Something went wrong</h2>
                        <p class="text-sm text-slate-400 mb-6">${e.message}</p>
                        <button onclick="localStorage.removeItem('${STORAGE_KEY}'); location.reload()" class="bg-red-600 text-white font-bold px-6 py-3 rounded-xl shadow-lg active:scale-95 transition">Factory Reset App</button>
                    </div>
                `;
            }
            root.innerHTML = html;
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
