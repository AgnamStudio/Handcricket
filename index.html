<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HCPL Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Teko:wght@500;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            user-select: none;
        }

        .font-display { font-family: 'Teko', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-text { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .coin-flip { animation: flip 1.2s ease-out forwards; }
        @keyframes flip {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(720deg) scale(1.5); }
            100% { transform: rotateY(1440deg) scale(1); }
        }
        
        button:active { transform: scale(0.96); }
        button:disabled { transform: scale(1); opacity: 0.5; cursor: not-allowed; }
        .match-btn { transition: all 0.1s; }
        .commentary-scroll { scroll-behavior: smooth; }
        .glow-text { text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }
        .rivalry-glow { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <div id="app" class="w-full max-w-md bg-slate-900 h-screen sm:h-[95vh] sm:rounded-3xl shadow-2xl relative overflow-hidden flex flex-col border border-slate-800">
        <!-- Rendered Content -->
    </div>

    <script>
        // --- DATA & STATE MANAGEMENT ---
        const STORAGE_KEY = 'hcpl_v7_final_stats';

        const utils = {
            id: () => Math.random().toString(36).substr(2, 9),
            formatOvers: (balls) => `${Math.floor(balls / 6)}.${balls % 6}`,
            getDateString: () => new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }),
            randomComment: (type) => {
                const comments = {
                    6: ["Massive hit! Out of the park! 🔥", "Six runs! Beautiful timing.", "What a shot! It's huge! 🚀"],
                    4: ["Cracking shot for four!", "Finds the gap, four runs.", "Boundary! Excellent placement. ✨"],
                    3: ["Great running between the wickets.", "Three runs taken."],
                    2: ["Pushes for two.", "Good running, gets two."],
                    1: ["Just a single.", "Taps and runs.", "Quick single taken."],
                    0: ["Dot ball. Good bowling.", "No run.", "Defended well. 🛡️"],
                    'W': ["WICKET! He has to go! ❌", "Bowled him! What a delivery!", "Caught! Huge moment! 😱"]
                };
                let opts = comments[type] || comments[0];
                return opts[Math.floor(Math.random() * opts.length)];
            },
            createMatch: (stage, t1Id, t2Id, settings) => ({
                id: utils.id(), stage: stage, team1: t1Id, team2: t2Id,
                status: 'pending', inn: 1,
                t1Score: 0, t1Wickets: 0, t1Balls: 0, t2Score: 0, t2Wickets: 0, t2Balls: 0,
                t1Sixes: 0, t1Fours: 0, t2Sixes: 0, t2Fours: 0,
                t1Super: settings.superShots, t2Super: settings.superShots, 
                winnerId: null, logs: [], tossDone: false, tossWinnerId: null, tossChoice: null,
                isSuperOver: false, soInn: 1, soT1Score: 0, soT1Wickets: 0, soT1Balls: 0, soT2Score: 0, soT2Wickets: 0, soT2Balls: 0,
                historyStack: [] // For Undo feature
            }),
            checkRivalry: (t1, t2, currentState) => {
                let champs = [];
                currentState.tournaments.forEach(t => { 
                    if (t.type === 'tournament' && t.winner && !champs.includes(t.winner)) champs.push(t.winner); 
                });
                return (champs.includes(t1.id) && champs.includes(t2.id) && t1.id !== t2.id); 
            }
        };

        const defaultState = {
            view: 'home', 
            activeTourneyId: null, activeMatchId: null, tournaments: [] // Combines both Quick Matches and Tournaments
        };

        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState;
        function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        // --- GLOBAL APP LOGIC ---
        window.app = {
            navigate: (view, params = {}) => {
                state.view = view;
                if (params.tourneyId) state.activeTourneyId = params.tourneyId;
                if (params.matchId) state.activeMatchId = params.matchId;
                saveState(); render();
            },
            
            // QUICK MATCH LOGIC
            qmTeam1: { name: 'India', owner: 'BCCI', emoji: '🇮🇳' },
            qmTeam2: { name: 'Australia', owner: 'CA', emoji: '🇦🇺' },

            startQuickMatch: () => {
                const overs = parseInt(document.getElementById('qm_overs').value) || 2;
                const wickets = parseInt(document.getElementById('qm_wickets').value) || 10;
                const superShots = parseInt(document.getElementById('qm_super').value) || 0;

                const settings = { balls: overs * 6, wickets, superShots };
                
                let t1 = { id: utils.id(), ...app.qmTeam1 };
                let t2 = { id: utils.id(), ...app.qmTeam2 };

                let qmTourney = {
                    id: utils.id(),
                    name: `${t1.name} vs ${t2.name}`,
                    type: 'quickMatch',
                    date: utils.getDateString(),
                    settings,
                    teams: [t1, t2],
                    matches: [utils.createMatch('Quick Match', t1.id, t2.id, settings)],
                    winner: null
                };

                state.tournaments.push(qmTourney);
                state.activeTourneyId = qmTourney.id;
                state.activeMatchId = qmTourney.matches[0].id;
                saveState();
                app.navigate('toss');
            },
            
            // TOURNAMENT LOGIC
            tempTeams: [
                { id: utils.id(), owner: 'Mukesh A.', name: 'Mumbai Smashers', emoji: '🟣' },
                { id: utils.id(), owner: 'Shahrukh K.', name: 'Kolkata Warriors', emoji: '🔵' },
                { id: utils.id(), owner: 'Preity Z.', name: 'Punjab Titans', emoji: '🟡' },
                { id: utils.id(), owner: 'Kalanithi M.', name: 'Hyderabad Knights', emoji: '🔴' }
            ],
            
            addTempTeam: () => {
                if(app.tempTeams.length >= 8) return alert("Max 8 franchises allowed.");
                app.tempTeams.push({ id: utils.id(), owner: 'New Owner', name: 'New Team', emoji: '🏏' });
                render();
            },
            updateTempTeam: (index, field, value) => { app.tempTeams[index][field] = value; },
            removeTempTeam: (index) => {
                if(app.tempTeams.length <= 4) return alert("Min 4 franchises required.");
                app.tempTeams.splice(index, 1);
                render();
            },
            
            createTournament: () => {
                const name = document.getElementById('t_name').value || 'New Season';
                const overs = parseInt(document.getElementById('t_overs').value) || 2;
                const wickets = parseInt(document.getElementById('t_wickets').value) || 10;
                const superShots = parseInt(document.getElementById('t_super_count').value) || 0;
                const rrMultiplier = parseInt(document.getElementById('t_schedule_type').value) || 1;
                
                const settings = { balls: overs * 6, wickets, superShots };
                const seasonTeams = app.tempTeams.map(t => ({...t, id: utils.id()})); // Refresh IDs for new season

                const newTourney = { 
                    id: utils.id(), name, type: 'tournament', date: utils.getDateString(), 
                    settings, teams: seasonTeams, matches: [], playoffsGenerated: false, winner: null 
                };

                let teamIds = seasonTeams.map(t => t.id);
                if (teamIds.length % 2 !== 0) teamIds.push(null); 
                let numTeams = teamIds.length; let rounds = numTeams - 1; let half = numTeams / 2;
                let baseRounds = []; let currentTeamIds = [...teamIds];

                for (let r = 0; r < rounds; r++) {
                    let thisRound = [];
                    for (let i = 0; i < half; i++) {
                        let t1 = currentTeamIds[i]; let t2 = currentTeamIds[numTeams - 1 - i];
                        if (t1 !== null && t2 !== null) thisRound.push({t1, t2});
                    }
                    baseRounds.push(thisRound);
                    currentTeamIds.splice(1, 0, currentTeamIds.pop());
                }

                let schedule = [];
                for (let m = 0; m < rrMultiplier; m++) {
                    baseRounds.forEach(round => {
                        round.forEach(match => {
                            if (m % 2 === 1) schedule.push(utils.createMatch('League', match.t2, match.t1, settings));
                            else schedule.push(utils.createMatch('League', match.t1, match.t2, settings));
                        });
                    });
                }
                newTourney.matches = schedule;
                state.tournaments.push(newTourney);
                app.navigate('hub', { tourneyId: newTourney.id });
            },

            // TOSS SYSTEM
            tossState: null, tossWinnerIdx: null,
            doToss: () => {
                app.tossState = 'flipping'; render();
                setTimeout(() => { app.tossWinnerIdx = Math.random() < 0.5 ? 1 : 2; app.tossState = 'result'; render(); }, 1200);
            },
            completeToss: (choice) => {
                const t = state.tournaments.find(x => x.id === state.activeTourneyId);
                const m = t.matches.find(x => x.id === state.activeMatchId);
                
                let winnerId = app.tossWinnerIdx === 1 ? m.team1 : m.team2;
                m.tossWinnerId = winnerId; m.tossChoice = choice; m.tossDone = true;

                let team1BatsFirst = true;
                if (winnerId === m.team1 && choice === 'bowl') team1BatsFirst = false;
                if (winnerId === m.team2 && choice === 'bat') team1BatsFirst = false;

                if (!team1BatsFirst) {
                    let temp = m.team1; m.team1 = m.team2; m.team2 = temp;
                    let tempS = m.t1Super; m.t1Super = m.t2Super; m.t2Super = tempS;
                }

                let winnerTeam = t.teams.find(x => x.id === winnerId);
                m.logs.unshift(`🪙 Toss: ${winnerTeam.name} won and chose to ${choice} first.`);
                app.tossState = null; app.tossWinnerIdx = null; app.navigate('match');
            },

            // MATCH ENGINE & UNDO
            activeSuperShot: false,
            toggleSuperShot: () => { app.activeSuperShot = !app.activeSuperShot; render(); },

            undoLastBall: () => {
                const t = state.tournaments.find(x => x.id === state.activeTourneyId);
                const m = t.matches.find(x => x.id === state.activeMatchId);
                
                if (!m.historyStack || m.historyStack.length === 0) return alert("Nothing to undo!");
                
                let lastStateStr = m.historyStack.pop();
                let lastState = JSON.parse(lastStateStr);
                
                Object.assign(m, lastState); // Restore
                m.status = 'active'; // In case it was complete
                app.activeSuperShot = false; // Reset toggle UI
                
                saveState(); render();
            },

            playBall: (run, isOut = false) => {
                const t = state.tournaments.find(x => x.id === state.activeTourneyId);
                const m = t.matches.find(x => x.id === state.activeMatchId);
                if (m.status === 'completed') return;

                // SAVE SNAPSHOT FOR UNDO
                let snapshot = JSON.stringify({
                    t1Score: m.t1Score, t1Wickets: m.t1Wickets, t1Balls: m.t1Balls,
                    t2Score: m.t2Score, t2Wickets: m.t2Wickets, t2Balls: m.t2Balls,
                    t1Sixes: m.t1Sixes, t1Fours: m.t1Fours, t2Sixes: m.t2Sixes, t2Fours: m.t2Fours,
                    t1Super: m.t1Super, t2Super: m.t2Super,
                    status: m.status, inn: m.inn, winnerId: m.winnerId,
                    isSuperOver: m.isSuperOver, soInn: m.soInn,
                    soT1Score: m.soT1Score, soT1Wickets: m.soT1Wickets, soT1Balls: m.soT1Balls,
                    soT2Score: m.soT2Score, soT2Wickets: m.soT2Wickets, soT2Balls: m.soT2Balls,
                    logs: [...m.logs]
                });
                m.historyStack = m.historyStack || [];
                m.historyStack.push(snapshot);
                if (m.historyStack.length > 50) m.historyStack.shift();

                m.status = 'active';

                let isT1Batting = m.isSuperOver ? (m.soInn === 1) : (m.inn === 1);
                let actualRun = run;

                if (isOut) {
                    if (app.activeSuperShot) {
                        // CATASTROPHE
                        if (isT1Batting) {
                            if (m.isSuperOver) { m.soT1Wickets = 2; m.soT1Balls++; } else { m.t1Wickets = t.settings.wickets; m.t1Balls++; }
                            m.t1Super--;
                        } else {
                            if (m.isSuperOver) { m.soT2Wickets = 2; m.soT2Balls++; } else { m.t2Wickets = t.settings.wickets; m.t2Balls++; }
                            m.t2Super--;
                        }
                        let currentBalls = isT1Batting ? (m.isSuperOver ? m.soT1Balls : m.t1Balls) : (m.isSuperOver ? m.soT2Balls : m.t2Balls);
                        m.logs.unshift(`Ball ${utils.formatOvers(currentBalls)}: 😱 CATASTROPHE! Caught on a Super Shot! ALL wickets lost!`);
                        app.activeSuperShot = false; 
                    } else {
                        // INSTANT NORMAL OUT
                        if (isT1Batting) {
                            if (m.isSuperOver) { m.soT1Wickets++; m.soT1Balls++; } else { m.t1Wickets++; m.t1Balls++; }
                        } else {
                            if (m.isSuperOver) { m.soT2Wickets++; m.soT2Balls++; } else { m.t2Wickets++; m.t2Balls++; }
                        }
                        let currentBalls = isT1Batting ? (m.isSuperOver ? m.soT1Balls : m.t1Balls) : (m.isSuperOver ? m.soT2Balls : m.t2Balls);
                        m.logs.unshift(`Ball ${utils.formatOvers(currentBalls)}: ${utils.randomComment('W')}`);
                    }
                } else {
                    if (app.activeSuperShot) {
                        actualRun *= 2; isT1Batting ? m.t1Super-- : m.t2Super--;
                        let currentBalls = isT1Batting ? (m.isSuperOver ? m.soT1Balls+1 : m.t1Balls+1) : (m.isSuperOver ? m.soT2Balls+1 : m.t2Balls+1);
                        m.logs.unshift(`Ball ${utils.formatOvers(currentBalls)}: 🔥 SUPER SHOT! ${actualRun} Runs!`);
                        app.activeSuperShot = false;
                    } else {
                        let currentBalls = isT1Batting ? (m.isSuperOver ? m.soT1Balls+1 : m.t1Balls+1) : (m.isSuperOver ? m.soT2Balls+1 : m.t2Balls+1);
                        m.logs.unshift(`Ball ${utils.formatOvers(currentBalls)}: ${actualRun} Runs! ${utils.randomComment(run)}`);
                    }

                    if (!m.isSuperOver) {
                        if (actualRun === 6) isT1Batting ? m.t1Sixes++ : m.t2Sixes++;
                        if (actualRun === 4) isT1Batting ? m.t1Fours++ : m.t2Fours++;
                    }

                    if (m.isSuperOver) {
                        isT1Batting ? m.soT1Score += actualRun : m.soT2Score += actualRun;
                        isT1Batting ? m.soT1Balls++ : m.soT2Balls++;
                    } else {
                        isT1Batting ? m.t1Score += actualRun : m.t2Score += actualRun;
                        isT1Batting ? m.t1Balls++ : m.t2Balls++;
                    }
                }

                app.checkMatchState(t, m);
                saveState();
                if (m.status === 'completed') app.navigate('scorecard'); else render();
            },

            checkMatchState: (t, m) => {
                if (!m.isSuperOver) {
                    let maxB = t.settings.balls; let maxW = t.settings.wickets;
                    if (m.inn === 1 && (m.t1Balls >= maxB || m.t1Wickets >= maxW)) {
                        m.inn = 2; app.activeSuperShot = false; m.logs.unshift("--- INNINGS BREAK ---");
                    } else if (m.inn === 2) {
                        let target = m.t1Score + 1;
                        if (m.t2Score >= target || m.t2Balls >= maxB || m.t2Wickets >= maxW) {
                            if (m.t2Score === m.t1Score) {
                                m.isSuperOver = true; m.soInn = 1; app.activeSuperShot = false;
                                m.logs.unshift("⚔️ MATCH TIED! SUPER OVER STARTING! ⚔️");
                            } else {
                                m.status = 'completed'; m.logs.unshift("--- MATCH OVER ---");
                                m.winnerId = m.t2Score > m.t1Score ? m.team2 : m.team1;
                                if (m.stage === 'Final' || t.type === 'quickMatch') t.winner = m.winnerId;
                            }
                        }
                    }
                } else {
                    let maxSOBalls = 6; let maxSOWickets = 2;
                    if (m.soInn === 1 && (m.soT1Balls >= maxSOBalls || m.soT1Wickets >= maxSOWickets)) {
                        m.soInn = 2; app.activeSuperShot = false; m.logs.unshift("--- SUPER OVER: INNINGS BREAK ---");
                    } else if (m.soInn === 2) {
                        let target = m.soT1Score + 1;
                        if (m.soT2Score >= target || m.soT2Balls >= maxSOBalls || m.soT2Wickets >= maxSOWickets) {
                            if (m.soT2Score === m.soT1Score) {
                                m.soInn = 1; app.activeSuperShot = false;
                                m.soT1Score = 0; m.soT1Wickets = 0; m.soT1Balls = 0; m.soT2Score = 0; m.soT2Wickets = 0; m.soT2Balls = 0;
                                m.logs.unshift("😱 SUPER OVER TIED! ANOTHER SUPER OVER STARTING! 😱");
                            } else {
                                m.status = 'completed'; m.logs.unshift("--- SUPER OVER COMPLETED ---");
                                m.winnerId = m.soT2Score > m.soT1Score ? m.team2 : m.team1;
                                if (m.stage === 'Final' || t.type === 'quickMatch') t.winner = m.winnerId;
                            }
                        }
                    }
                }
            },

            // TOURNAMENT PLAYOFFS
            generatePlayoffs: () => {
                const t = state.tournaments.find(x => x.id === state.activeTourneyId);
                const table = app.getPointsTable(t);
                if (table.length < 4) return alert("Need 4 teams for playoffs.");

                t.matches.push(utils.createMatch('Qualifier 1', table[0].id, table[1].id, t.settings));
                t.matches.push(utils.createMatch('Eliminator', table[2].id, table[3].id, t.settings));
                t.playoffsGenerated = true; saveState(); render();
            },

            checkPlayoffProgression: (t) => {
                if(!t.playoffsGenerated) return;
                let q1 = t.matches.find(m => m.stage === 'Qualifier 1'); let elim = t.matches.find(m => m.stage === 'Eliminator');
                let q2 = t.matches.find(m => m.stage === 'Qualifier 2'); let final = t.matches.find(m => m.stage === 'Final');

                if (q1?.status === 'completed' && elim?.status === 'completed' && !q2) {
                    let loserQ1 = q1.winnerId === q1.team1 ? q1.team2 : q1.team1;
                    t.matches.push(utils.createMatch('Qualifier 2', loserQ1, elim.winnerId, t.settings));
                }
                if (q1?.status === 'completed' && q2?.status === 'completed' && !final) {
                    t.matches.push(utils.createMatch('Final', q1.winnerId, q2.winnerId, t.settings));
                }
            },

            getPointsTable: (t) => {
                let p = {}; t.teams.forEach(team => { p[team.id] = { ...team, m: 0, w: 0, l: 0, tie: 0, pts: 0, runsFor: 0, ballsFor: 0, runsAgainst: 0, ballsAgainst: 0, nrr: 0 }; });

                t.matches.filter(m => m.status === 'completed' && m.stage === 'League').forEach(m => {
                    let t1 = p[m.team1]; let t2 = p[m.team2]; if(!t1 || !t2) return;
                    t1.m++; t2.m++;
                    if (m.winnerId === m.team1) { t1.w++; t1.pts += 2; t2.l++; }
                    else if (m.winnerId === m.team2) { t2.w++; t2.pts += 2; t1.l++; }
                    else { t1.tie++; t2.tie++; t1.pts++; t2.pts++; } 

                    let maxBalls = t.settings.balls;
                    let t1OversFaced = (m.t1Wickets >= t.settings.wickets) ? (maxBalls / 6) : (m.t1Balls / 6);
                    let t2OversFaced = (m.t2Wickets >= t.settings.wickets) ? (maxBalls / 6) : (m.t2Balls / 6);

                    t1.runsFor += m.t1Score; t1.ballsFor += t1OversFaced; t1.runsAgainst += m.t2Score; t1.ballsAgainst += t2OversFaced;
                    t2.runsFor += m.t2Score; t2.ballsFor += t2OversFaced; t2.runsAgainst += m.t1Score; t2.ballsAgainst += t1OversFaced;
                });

                let table = Object.values(p).map(team => {
                    let rf = team.runsFor; let of = team.ballsFor || 1;
                    let ra = team.runsAgainst; let oa = team.ballsAgainst || 1;
                    team.nrr = (team.m === 0) ? 0 : ((rf / of) - (ra / oa));
                    return team;
                });
                table.sort((a, b) => b.pts - a.pts || b.nrr - a.nrr); return table;
            },

            // SPECIFIC TOURNAMENT STATS
            getTournamentStats: (t) => {
                let stats = {};
                t.teams.forEach(team => { stats[team.id] = { ...team, runs: 0, wickets: 0, sixes: 0, fours: 0, mvpPts: 0, matches: 0 }; });

                let highestScore = { score: 0, team: null }; let highestChase = { score: 0, team: null }; let lowestDefend = { score: 9999, team: null };

                t.matches.filter(m => m.status === 'completed').forEach(m => {
                    if (!stats[m.team1] || !stats[m.team2]) return;
                    stats[m.team1].matches++; stats[m.team2].matches++;

                    stats[m.team1].runs += m.t1Score; stats[m.team1].wickets += m.t2Wickets; stats[m.team1].sixes += m.t1Sixes; stats[m.team1].fours += m.t1Fours;
                    stats[m.team2].runs += m.t2Score; stats[m.team2].wickets += m.t1Wickets; stats[m.team2].sixes += m.t2Sixes; stats[m.team2].fours += m.t2Fours;

                    if (m.t1Score > highestScore.score) highestScore = { score: m.t1Score, team: stats[m.team1] };
                    if (m.t2Score > highestScore.score) highestScore = { score: m.t2Score, team: stats[m.team2] };

                    if (m.winnerId === m.team2 && m.t2Score > highestChase.score) highestChase = { score: m.t2Score, team: stats[m.team2] };
                    if (m.winnerId === m.team1 && m.t1Score < lowestDefend.score) lowestDefend = { score: m.t1Score, team: stats[m.team1] };
                });

                Object.values(stats).forEach(s => { s.mvpPts = s.runs + (s.wickets * 10) + (s.sixes * 2) + s.fours; });

                let sArr = Object.values(stats);
                return {
                    tableStats: sArr,
                    orangeCap: [...sArr].sort((a,b) => b.runs - a.runs)[0],
                    purpleCap: [...sArr].sort((a,b) => b.wickets - a.wickets)[0],
                    mostSixes: [...sArr].sort((a,b) => b.sixes - a.sixes)[0],
                    mostFours: [...sArr].sort((a,b) => b.fours - a.fours)[0],
                    mvp: [...sArr].sort((a,b) => b.mvpPts - a.mvpPts)[0],
                    highestScore, highestChase, lowestDefend
                };
            },

            // GLOBAL STATS (All Teams Combined)
            getGlobalStats: () => {
                let teamStats = {};
                state.tournaments.forEach(t => {
                    t.matches.filter(m => m.status === 'completed').forEach(m => {
                        let t1 = t.teams.find(x => x.id === m.team1);
                        let t2 = t.teams.find(x => x.id === m.team2);
                        if (!t1 || !t2) return;

                        // Aggregate by exact team name
                        if (!teamStats[t1.name]) teamStats[t1.name] = { name: t1.name, emoji: t1.emoji, owner: t1.owner, matches: 0, wins: 0, runs: 0, wkts: 0, sixes: 0, fours: 0 };
                        if (!teamStats[t2.name]) teamStats[t2.name] = { name: t2.name, emoji: t2.emoji, owner: t2.owner, matches: 0, wins: 0, runs: 0, wkts: 0, sixes: 0, fours: 0 };

                        let st1 = teamStats[t1.name]; let st2 = teamStats[t2.name];

                        st1.matches++; st2.matches++;
                        if (m.winnerId === m.team1) st1.wins++;
                        else if (m.winnerId === m.team2) st2.wins++;

                        st1.runs += m.t1Score; st1.wkts += m.t2Wickets; st1.sixes += m.t1Sixes; st1.fours += m.t1Fours;
                        st2.runs += m.t2Score; st2.wkts += m.t1Wickets; st2.sixes += m.t2Sixes; st2.fours += m.t2Fours;
                    });
                });
                return Object.values(teamStats).sort((a,b) => b.wins - a.wins || b.runs - a.runs);
            },

            setHubTab: (tab) => { app.hubTab = tab; render(); },

        function renderMatch() {
            const t = state.tournaments.find(x => x.id === state.activeTourneyId);

            if(m.status === 'completed') return `<div class="flex h-full items-center justify-center bg-slate-950 text-slate-400 animate-pulse font-bold">Loading Scorecard...</div>`;

            let isRivalry = utils.checkRivalry(t1, t2, state);
            
            let isSuper = m.isSuperOver;
            let inn = isSuper ? m.soInn : m.inn;
            let batT = inn === 1 ? t1 : t2;
            
            let score = isSuper ? (inn === 1 ? m.soT1Score : m.soT2Score) : (inn === 1 ? m.t1Score : m.t2Score);

                        <button onclick="app.playBall(0, true)" class="match-btn bg-red-600 hover:bg-red-500 text-white h-14 rounded-2xl text-xl font-black border-b-4 border-red-900 uppercase tracking-widest shadow-[0_0_15px_rgba(220,38,38,0.3)]">OUT</button>

                        </div>

        function renderScorecard() {
            const t = state.tournaments.find(x => x.id === state.activeTourneyId);
            const m = t.matches.find(x => x.id === state.activeMatchId);
            const t1 = t.teams.find(x => x.id === m.team1);
            const t2 = t.teams.find(x => x.id === m.team2);
            let isRivalry = utils.checkRivalry(t1, t2, state);

            let resultText = "Match Tied";
            let resultColor = "text-slate-300";
            
            if (m.isSuperOver && m.winnerId !== 'tie') {
                resultText = `${t.teams.find(x=>x.id===m.winnerId).name} won the Super Over!`;
                resultColor = "text-amber-400";
            } else if (m.winnerId === t1.id) {
                let runs = m.t1Score - m.t2Score;
                resultText = `${t1.name} won by ${runs} run${runs>1?'s':''}`;
                resultColor = "text-blue-400";
            } else if (m.winnerId === t2.id) {
                let wkts = t.settings.wickets - m.t2Wickets;
                resultText = `${t2.name} won by ${wkts} wkt${wkts>1?'s':''}`;
                resultColor = "text-blue-400";
            }

            return `
                ${TopBar("Scorecard", t.type === 'quickMatch' ? 'home' : 'hub', {tourneyId: t.id})}
                <div class="flex-1 overflow-y-auto p-4 fade-in no-scrollbar bg-slate-950">
                    
                    <div class="bg-slate-900 rounded-3xl p-6 text-center shadow-lg border ${isRivalry ? 'border-red-500/50' : 'border-slate-800'} relative overflow-hidden mb-6">
                        ${isRivalry ? `<div class="absolute top-0 left-0 right-0 bg-gradient-to-r from-red-600 to-orange-600 text-white text-[10px] font-black uppercase tracking-widest py-1 mb-4 shadow-sm">🔥 Rivalry Match 🔥</div><div class="pt-4"></div>` : ''}
                        
                        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-5 mt-2">${m.stage}</div>
                        
                        <div class="flex justify-between items-center mb-5 relative z-10">
                            <div class="flex-1">
                                <div class="text-5xl mb-2 drop-shadow-md">${t1.emoji}</div>
                                <div class="text-sm font-bold text-slate-300 truncate">${t1.name}</div>
                                <div class="font-display text-4xl font-bold mt-1.5 text-white leading-none">${m.t1Score}<span class="text-2xl text-slate-500">/${m.t1Wickets}</span></div>
                                <div class="text-[11px] font-medium text-slate-500 mt-1.5 bg-slate-950 inline-block px-2 py-0.5 rounded border border-slate-800">${utils.formatOvers(m.t1Balls)} ov</div>
                            </div>
                            <div class="px-3 text-slate-700 font-black italic text-2xl">VS</div>
                            <div class="flex-1">
                                <div class="text-5xl mb-2 drop-shadow-md">${t2.emoji}</div>
                                <div class="text-sm font-bold text-slate-300 truncate">${t2.name}</div>
                                <div class="font-display text-4xl font-bold mt-1.5 text-white leading-none">${m.t2Score}<span class="text-2xl text-slate-500">/${m.t2Wickets}</span></div>
                                <div class="text-[11px] font-medium text-slate-500 mt-1.5 bg-slate-950 inline-block px-2 py-0.5 rounded border border-slate-800">${utils.formatOvers(m.t2Balls)} ov</div>
                            </div>
                        </div>

                        ${m.isSuperOver ? `
                            <div class="bg-red-950/40 border border-red-500/20 rounded-2xl p-4 relative overflow-hidden mt-3 mb-3 shadow-inner">
                                <div class="text-[10px] text-red-400 font-black uppercase tracking-widest text-center mb-2.5">⚔️ Super Over Box ⚔️</div>
                                <div class="flex justify-between items-center text-white">
                                    <div class="text-center flex-1">
                                        <div class="font-display text-3xl leading-none">${m.soT1Score}<span class="text-xl text-red-300/50">/${m.soT1Wickets}</span></div>
                                        <div class="text-[10px] font-medium text-red-200/50 mt-1">${utils.formatOvers(m.soT1Balls)} ov</div>
                                    </div>
                                    <div class="text-xs text-red-500/30 font-black italic px-2">VS</div>
                                    <div class="text-center flex-1">
                                        <div class="font-display text-3xl leading-none">${m.soT2Score}<span class="text-xl text-red-300/50">/${m.soT2Wickets}</span></div>
                                        <div class="text-[10px] font-medium text-red-200/50 mt-1">${utils.formatOvers(m.soT2Balls)} ov</div>
                                    </div>
                                </div>
                            </div>
                        ` : ''}

                        <div class="bg-slate-950/50 py-3.5 rounded-xl border border-slate-800 mt-5">
                            <div class="font-bold ${resultColor} text-sm uppercase tracking-wider">${resultText}</div>
                        </div>
                    </div>

                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 ml-1">Match Highlights</h3>
                    <div class="bg-slate-900 rounded-2xl p-4 border border-slate-800 space-y-2 h-64 overflow-y-auto no-scrollbar shadow-inner">
                        ${m.logs.filter(l => l.includes('WICKET') || l.includes('6 Runs') || l.includes('SUPER') || l.includes('Toss:') || l.includes('CATASTROPHE')).map(log => `
                            <div class="text-[11px] p-2.5 rounded-lg bg-slate-950 border-l-2 ${
                                log.includes('CATASTROPHE') ? 'border-red-600 text-red-300 font-bold' :
                                log.includes('SUPER OVER') ? 'border-red-500 text-white font-bold' :
                                log.includes('WICKET') ? 'border-red-500 text-slate-300' : 
                                log.includes('Toss') ? 'border-blue-500 text-blue-300 font-medium' : 
                                'border-amber-500 text-slate-300'
                            }">
                                ${log.replace('Ball ', '<span class="text-slate-600 font-mono mr-2">').replace(':', '</span>')}
                            </div>
                        `).join('')}
                        ${m.logs.length === 0 ? `<div class="text-slate-600 text-center text-xs py-4 font-medium">No highlights recorded.</div>` : ''}
                    </div>
                    
                    <button onclick="app.navigate('${t.type === 'quickMatch' ? 'home' : 'hub'}', {tourneyId: '${t.id}'})" class="w-full mt-6 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-500 transition active:scale-95 text-lg tracking-wide">
                        ${t.type === 'quickMatch' ? 'Back to Home' : 'Back to Hub'}
                    </button>
                </div>
            `;
        }

        function renderAwards() {
            const t = state.tournaments.find(x => x.id === state.activeTourneyId);
            let s = app.getTournamentStats(t);
            let champion = t.teams.find(x => x.id === t.winner);
            
            let finalMatch = t.matches.find(m => m.stage === 'Final');
            let runnerUpId = finalMatch ? (finalMatch.winnerId === finalMatch.team1 ? finalMatch.team2 : finalMatch.team1) : null;
            let runnerUp = runnerUpId ? t.teams.find(x => x.id === runnerUpId) : null;

            return `
                ${TopBar("Season Summary", 'hub', {tourneyId: t.id})}
                <div class="flex-1 overflow-y-auto p-4 fade-in no-scrollbar bg-slate-950 pb-10">
                    
                    <div class="text-center mb-8 mt-6">
                        <i data-lucide="trophy" class="w-14 h-14 mx-auto text-yellow-500 mb-3 drop-shadow-[0_0_20px_rgba(234,179,8,0.6)]"></i>
                        <h2 class="text-4xl font-display font-bold text-white glow-text tracking-wider uppercase leading-none">${t.name}</h2>
                        <div class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-2">Post-Match Presentation</div>
                    </div>

                    <!-- Champions Box -->
                    <div class="bg-gradient-to-br from-yellow-600 to-amber-700 p-8 rounded-[32px] text-center shadow-[0_10px_30px_-5px_rgba(245,158,11,0.3)] border border-yellow-400/50 mb-6 relative overflow-hidden">
                        <h3 class="text-yellow-100 text-[10px] font-black uppercase tracking-widest mb-4 relative z-10 drop-shadow-md">🏆 CHAMPIONS</h3>
                        <div class="text-7xl drop-shadow-2xl mb-3 relative z-10 transform scale-110">${champion.emoji}</div>
                        <div class="text-4xl font-display font-bold text-white relative z-10 tracking-wide">${champion.name}</div>
                    </div>

                    ${runnerUp ? `
                        <div class="bg-slate-900 p-4 rounded-2xl text-center border border-slate-800 mb-8 flex items-center justify-center gap-3 shadow-sm">
                            <span class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Runner Up:</span>
                            <span class="text-2xl">${runnerUp.emoji}</span>
                            <span class="font-bold text-white text-lg">${runnerUp.name}</span>
                        </div>
                    ` : ''}

                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 text-center shadow-sm">
                            <div class="text-[10px] text-orange-400 font-black uppercase tracking-widest mb-3">Orange Cap</div>
                            <div class="text-4xl mb-2">${s.orangeCap.emoji}</div>
                            <div class="font-bold text-white text-sm truncate">${s.orangeCap.name}</div>
                            <div class="text-3xl font-display text-orange-400 mt-1 leading-none">${s.orangeCap.runs} <span class="text-[11px] font-sans font-medium text-slate-500">runs</span></div>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 text-center shadow-sm">
                            <div class="text-[10px] text-purple-400 font-black uppercase tracking-widest mb-3">Purple Cap</div>
                            <div class="text-4xl mb-2">${s.purpleCap.emoji}</div>
                            <div class="font-bold text-white text-sm truncate">${s.purpleCap.name}</div>
                            <div class="text-3xl font-display text-purple-400 mt-1 leading-none">${s.purpleCap.wickets} <span class="text-[11px] font-sans font-medium text-slate-500">wkts</span></div>
                        </div>
                    </div>

                    <!-- MVP -->
                    <div class="bg-gradient-to-r from-blue-900 to-indigo-900 p-5 rounded-2xl border border-blue-500/40 mb-8 flex items-center gap-5 shadow-lg">
                        <div class="text-5xl drop-shadow-md bg-slate-950/50 p-3 rounded-2xl border border-blue-400/20">${s.mvp.emoji}</div>
                        <div class="flex-1">
                            <div class="text-[9px] text-blue-300 uppercase font-black tracking-widest mb-1.5">Most Valuable Player</div>
                            <div class="text-xl font-bold text-white tracking-wide">${s.mvp.name}</div>
                            <div class="text-xs font-medium text-slate-400 mt-1">${s.mvp.mvpPts} Performance Pts</div>
                        </div>
                    </div>

                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 ml-1 border-b border-slate-800 pb-2">Tournament Records</h3>
                    <div class="space-y-2.5 mb-8">
                        <div class="bg-slate-900 p-3.5 rounded-xl border border-slate-800 flex justify-between items-center shadow-sm">
                            <span class="text-xs font-medium text-slate-400">Highest Score</span>
                            <span class="font-bold text-white text-sm">${s.highestScore.team ? `${s.highestScore.team.emoji} ${s.highestScore.team.name} <span class="text-slate-600 mx-1">|</span> <span class="text-blue-400 font-display text-xl leading-none relative top-0.5">${s.highestScore.score}</span>` : 'N/A'}</span>
                        </div>
                        <div class="bg-slate-900 p-3.5 rounded-xl border border-slate-800 flex justify-between items-center shadow-sm">
                            <span class="text-xs font-medium text-slate-400">Highest Chase</span>
                            <span class="font-bold text-white text-sm">${s.highestChase.team ? `${s.highestChase.team.emoji} ${s.highestChase.team.name} <span class="text-slate-600 mx-1">|</span> <span class="text-green-400 font-display text-xl leading-none relative top-0.5">${s.highestChase.score}</span>` : 'N/A'}</span>
                        </div>
                        <div class="bg-slate-900 p-3.5 rounded-xl border border-slate-800 flex justify-between items-center shadow-sm">
                            <span class="text-xs font-medium text-slate-400">Lowest Defend</span>
                            <span class="font-bold text-white text-sm">${s.lowestDefend.team && s.lowestDefend.score !== 9999 ? `${s.lowestDefend.team.emoji} ${s.lowestDefend.team.name} <span class="text-slate-600 mx-1">|</span> <span class="text-red-400 font-display text-xl leading-none relative top-0.5">${s.lowestDefend.score}</span>` : 'N/A'}</span>
                        </div>
                    </div>

                    <button onclick="app.navigate('home')" class="w-full bg-slate-800 text-white font-bold py-4.5 rounded-xl border border-slate-700 hover:bg-slate-700 transition active:scale-95 tracking-wide text-lg">
                        Return to Home
                    </button>
                </div>
            `;
        }

        // --- CORE INITIALIZATION ---
        function render() {
            const root = document.getElementById('app');
            let html = '';
            try {
                switch(state.view) {
                    case 'home': html = renderHome(); break;
                    case 'quickMatchSetup': html = renderQuickMatchSetup(); break;
                    case 'history': html = renderHistory(); break;
                    case 'globalStats': html = renderGlobalStats(); break;
                    case 'create': html = renderCreate(); break;
                    case 'hub': html = renderHub(); break;
                    case 'toss': html = renderToss(); break;
                    case 'match': html = renderMatch(); break;
                    case 'scorecard': html = renderScorecard(); break;
                    case 'awards': html = renderAwards(); break;
                    default: html = renderHome();
                }
            } catch (e) {
                console.error("Render Error:", e);
                html = `
                    <div class="flex flex-col h-full items-center justify-center p-8 text-center text-red-400 bg-slate-950">
                        <i data-lucide="alert-triangle" class="w-12 h-12 mb-4 text-red-500"></i>
                        <h2 class="text-xl font-bold text-white mb-2">Something went wrong</h2>
                        <p class="text-sm text-slate-400 mb-6">${e.message}</p>
                        <button onclick="localStorage.removeItem('${STORAGE_KEY}'); location.reload()" class="bg-red-600 text-white font-bold px-6 py-3 rounded-xl shadow-lg active:scale-95 transition">Factory Reset App</button>
                    </div>
                `;
            }
            root.innerHTML = html;
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
